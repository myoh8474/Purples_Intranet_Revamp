<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유입DB 상세 - 퍼플스 인트라넷</title>
  <link rel="stylesheet" href="../../src/styles/variables.css">
  <link rel="stylesheet" href="../../src/styles/base.css">
  <link rel="stylesheet" href="../../src/styles/layout.css">
  <link rel="stylesheet" href="../../src/styles/components.css">
  <style>
    body {
      overflow-y: auto;
      min-height: 100vh;
      background: var(--bg-primary);
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    #detail-content {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 48px;
      width: 100%;
      box-sizing: border-box;
    }
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-light);
      margin-bottom: 24px;
    }
    .detail-header__left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .detail-header__name {
      font-size: var(--font-size-xl);
      font-weight: 700;
    }
    .detail-header__meta {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }
    .detail-header__actions {
      display: flex;
      gap: 8px;
    }
    .section { margin-bottom: 28px; }
    .section__title {
      font-size: var(--font-size-base);
      font-weight: 700;
      margin-bottom: 12px;
      padding-bottom: 8px;
    }
    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
    .info-table td { padding: 6px 10px; border: 1px solid var(--border-light); vertical-align: middle; }
    .info-table .label {
      background: var(--bg-secondary);
      font-weight: 700;
      white-space: nowrap;
      color: var(--text-secondary);
      text-align: center;
      font-size: 12px;
    }
    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .action-bar__right { display: flex; gap: 8px; }
    .empty-state {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--font-size-sm);
      background: var(--bg-secondary);
    }
  </style>
</head>
<body>
  <div id="detail-content">로딩 중...</div>
  <div id="modal-root"></div>
  <div id="toast-container" style="position:fixed;top:20px;right:20px;z-index:9999"></div>
  <script type="module" src="./dist-detail.js"></script>
</body>
</html>
